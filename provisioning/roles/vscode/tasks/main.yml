---
- name: Check if VS Code is installed
  command: code --version
  become_user: "{{ sandbox_user }}"
  register: vscode_check
  changed_when: false
  ignore_errors: true

- name: Add Microsoft GPG key
  shell: |
    curl -fsSL https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor -o /usr/share/keyrings/microsoft-archive-keyring.gpg
  args:
    creates: /usr/share/keyrings/microsoft-archive-keyring.gpg
  when: vscode_check.rc != 0

- name: Add VS Code repository
  copy:
    content: |
      deb [arch=arm64 signed-by=/usr/share/keyrings/microsoft-archive-keyring.gpg] https://packages.microsoft.com/repos/code stable main
    dest: /etc/apt/sources.list.d/vscode.list
    mode: '0644'
  when: vscode_check.rc != 0

- name: Update apt cache after adding VS Code repo
  apt:
    update_cache: true
  when: vscode_check.rc != 0

- name: Install VS Code
  apt:
    name: code
    state: present
  when: vscode_check.rc != 0

- name: Verify VS Code installation
  command: code --version
  become_user: "{{ sandbox_user }}"
  changed_when: false
  ignore_errors: true
  register: vscode_version

- name: Print VS Code version
  debug:
    msg: "VS Code version: {{ vscode_version.stdout | default('not installed') }}"
