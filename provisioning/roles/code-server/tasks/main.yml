---
- name: Check if code-server is installed
  command: code-server --version
  register: cs_check
  changed_when: false
  ignore_errors: true

- name: Install code-server via install script
  shell: |
    curl -fsSL https://code-server.dev/install.sh | sh
  when: cs_check.rc != 0

- name: Create code-server config directory
  file:
    path: "/home/{{ sandbox_user }}/.config/code-server"
    state: directory
    owner: "{{ sandbox_user }}"
    group: "{{ sandbox_user }}"
    mode: '0755'

- name: Configure code-server
  copy:
    content: |
      bind-addr: 0.0.0.0:8080
      auth: none
      cert: false
    dest: "/home/{{ sandbox_user }}/.config/code-server/config.yaml"
    owner: "{{ sandbox_user }}"
    group: "{{ sandbox_user }}"
    mode: '0644'

- name: Enable code-server systemd service
  systemd:
    name: "code-server@{{ sandbox_user }}"
    enabled: true
    state: stopped
  ignore_errors: true

- name: Verify code-server installation
  command: code-server --version
  changed_when: false
  ignore_errors: true
  register: cs_version

- name: Print code-server version
  debug:
    msg: "code-server version: {{ cs_version.stdout | default('not installed') }}"
