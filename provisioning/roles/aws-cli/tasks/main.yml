---
- name: Check if AWS CLI is installed
  command: aws --version
  register: aws_check
  changed_when: false
  ignore_errors: true

- name: Download AWS CLI v2 for aarch64
  get_url:
    url: https://awscli.amazonaws.com/awscli-exe-linux-aarch64.zip
    dest: /tmp/awscli.zip
    mode: '0644'
  when: aws_check.rc != 0

- name: Unzip AWS CLI installer
  unarchive:
    src: /tmp/awscli.zip
    dest: /tmp/
    remote_src: true
  when: aws_check.rc != 0

- name: Install AWS CLI
  command: /tmp/aws/install
  when: aws_check.rc != 0

- name: Clean up AWS CLI installer
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/awscli.zip
    - /tmp/aws
  when: aws_check.rc != 0

- name: Verify AWS CLI installation
  command: aws --version
  changed_when: false
  register: aws_version

- name: Print AWS CLI version
  debug:
    msg: "AWS CLI version: {{ aws_version.stdout }}"
