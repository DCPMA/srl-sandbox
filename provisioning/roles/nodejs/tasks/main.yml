---
- name: Check if nvm is installed
  stat:
    path: "/home/{{ sandbox_user }}/.nvm/nvm.sh"
  register: nvm_installed

- name: Install nvm
  become_user: "{{ sandbox_user }}"
  shell: |
    curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.1/install.sh | bash
  args:
    creates: "/home/{{ sandbox_user }}/.nvm/nvm.sh"
  when: not nvm_installed.stat.exists

- name: Install Node.js v24 via nvm
  become_user: "{{ sandbox_user }}"
  shell: |
    export NVM_DIR="$HOME/.nvm"
    [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
    nvm install 24
    nvm alias default 24
  args:
    executable: /bin/bash
    creates: "/home/{{ sandbox_user }}/.nvm/versions/node"

- name: Add nvm to zshrc
  become_user: "{{ sandbox_user }}"
  blockinfile:
    path: "/home/{{ sandbox_user }}/.zshrc"
    create: true
    marker: "# {mark} NVM"
    block: |
      export NVM_DIR="$HOME/.nvm"
      [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
      [ -s "$NVM_DIR/bash_completion" ] && \. "$NVM_DIR/bash_completion"
