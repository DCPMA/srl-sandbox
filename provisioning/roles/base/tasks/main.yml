---
- name: Update apt cache
  apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install essential packages
  apt:
    name:
      - git
      - curl
      - wget
      - jq
      - ripgrep
      - fd-find
      - openssh-server
      - build-essential
      - python3
      - python3-pip
      - unzip
      - zsh
      - tmux
      - htop
      - ca-certificates
      - gnupg
      - lsb-release
      - sudo
    state: present

- name: Ensure SSH is enabled and running
  systemd:
    name: ssh
    enabled: true
    state: started

- name: Allow password authentication for SSH (fallback)
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PasswordAuthentication'
    line: 'PasswordAuthentication yes'
  notify: Restart SSH

- name: Enable PubkeyAuthentication
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PubkeyAuthentication'
    line: 'PubkeyAuthentication yes'
  notify: Restart SSH

- name: Ensure .ssh directory exists for sandbox user
  file:
    path: "/home/{{ sandbox_user }}/.ssh"
    state: directory
    owner: "{{ sandbox_user }}"
    group: "{{ sandbox_user }}"
    mode: '0700'

- name: Copy host SSH public keys to authorized_keys
  authorized_key:
    user: "{{ sandbox_user }}"
    state: present
    key: "{{ lookup('file', item) }}"
  with_fileglob:
    - "{{ lookup('env', 'HOME') }}/.ssh/id_ed25519.pub"
    - "{{ lookup('env', 'HOME') }}/.ssh/id_rsa.pub"
    - "{{ lookup('env', 'HOME') }}/.ssh/id_ecdsa.pub"
  ignore_errors: true

- name: Set default shell to zsh for sandbox user
  user:
    name: "{{ sandbox_user }}"
    shell: /usr/bin/zsh

- name: Create shared folder mount points
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ sandbox_user }}"
    group: "{{ sandbox_user }}"
    mode: '0755'
  loop:
    - /mnt/psf
