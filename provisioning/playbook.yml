---
- name: Provision srl-sandbox base VM
  hosts: base
  become: true
  vars:
    sandbox_user: parallels
  roles:
    - base
    - nodejs
    - claude-code
    - aws-cli
    - vscode
    - code-server

  post_tasks:
    - name: Validate all tools are installed
      block:
        - name: Check git
          command: git --version
          changed_when: false

        - name: Check node
          shell: bash -lc 'node --version'
          become_user: "{{ sandbox_user }}"
          changed_when: false

        - name: Check npm
          shell: bash -lc 'npm --version'
          become_user: "{{ sandbox_user }}"
          changed_when: false

        - name: Check claude
          shell: bash -lc 'claude --version'
          become_user: "{{ sandbox_user }}"
          changed_when: false

        - name: Check aws
          command: aws --version
          changed_when: false

        - name: Check code (VS Code)
          shell: bash -lc 'code --version'
          become_user: "{{ sandbox_user }}"
          changed_when: false
          ignore_errors: true

        - name: Check ripgrep
          command: rg --version
          changed_when: false

        - name: Check fd
          command: fdfind --version
          changed_when: false
          ignore_errors: true

      rescue:
        - name: Report validation failures
          debug:
            msg: "Some tool validations failed. Check the output above."
