name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Create Release & Update Formula
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install zsh
        run: sudo apt-get install -y zsh

      - name: Extract version from tag
        id: version
        env:
          REF: ${{ github.ref }}
        run: echo "version=${REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Validate version matches script
        env:
          TAG_VER: ${{ steps.version.outputs.version }}
        run: |
          script_ver=$(grep -o 'VERSION="[^"]*"' srl-sandbox | head -1 | sed 's/VERSION="//;s/"//')
          if [[ "$script_ver" != "$TAG_VER" ]]; then
            echo "::error::Tag version ($TAG_VER) doesn't match script version ($script_ver)"
            exit 1
          fi

      - name: Syntax check
        run: zsh -n srl-sandbox

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.version }}
        run: |
          gh release create "v${TAG}" \
            --title "srl-sandbox v${TAG}" \
            --generate-notes

      - name: Compute tarball SHA256
        id: sha
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ steps.version.outputs.version }}
        run: |
          url="https://github.com/${REPO}/archive/refs/tags/v${TAG}.tar.gz"
          sha=$(curl -sL "$url" | shasum -a 256 | cut -d' ' -f1)
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "SHA256: $sha"

      - name: Update formula via auto-merging PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.version }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
          URL: ${{ steps.sha.outputs.url }}
        run: |
          sed -i "s|url \"https://github.com/.*/archive/refs/tags/.*\.tar\.gz\"|url \"${URL}\"|" Formula/srl-sandbox.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Formula/srl-sandbox.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/srl-sandbox.rb
          if git diff --cached --quiet; then
            echo "Formula already up to date"
            exit 0
          fi

          branch="chore/formula-v${TAG}"
          git checkout -b "$branch"
          git commit -m "chore: update formula for v${TAG}"
          git push origin "$branch"

          gh pr create \
            --title "chore: update formula for v${TAG}" \
            --body "Auto-generated by release workflow. Updates formula URL and SHA256 for v${TAG}." \
            --base main --head "$branch"

          gh pr merge "$branch" --merge --auto
