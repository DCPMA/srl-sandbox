name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Create Release & Update Formula
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Validate version matches script
        run: |
          script_ver=$(grep -o 'VERSION="[^"]*"' srl-sandbox | head -1 | sed 's/VERSION="//;s/"//')
          tag_ver="${{ steps.version.outputs.version }}"
          if [[ "$script_ver" != "$tag_ver" ]]; then
            echo "::error::Tag version ($tag_ver) doesn't match script version ($script_ver)"
            exit 1
          fi

      - name: Syntax check
        run: zsh -n srl-sandbox

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "srl-sandbox ${{ github.ref_name }}" \
            --generate-notes

      - name: Compute tarball SHA256
        id: sha
        run: |
          url="https://github.com/${{ github.repository }}/archive/refs/tags/${{ github.ref_name }}.tar.gz"
          sha=$(curl -sL "$url" | shasum -a 256 | cut -d' ' -f1)
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "SHA256: $sha"

      - name: Update formula via PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sed -i '' 's|url "https://github.com/.*/archive/refs/tags/.*\.tar\.gz"|url "${{ steps.sha.outputs.url }}"|' Formula/srl-sandbox.rb
          sed -i '' 's|sha256 ".*"|sha256 "${{ steps.sha.outputs.sha256 }}"|' Formula/srl-sandbox.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/srl-sandbox.rb
          if git diff --cached --quiet; then
            echo "Formula already up to date"
            exit 0
          fi

          branch="chore/formula-${{ github.ref_name }}"
          git checkout -b "$branch"
          git commit -m "chore: update formula for ${{ github.ref_name }}"
          git push origin "$branch"

          gh pr create \
            --title "chore: update formula for ${{ github.ref_name }}" \
            --body "Auto-generated by release workflow. Updates formula URL and SHA256 for ${{ github.ref_name }}." \
            --base main --head "$branch"
