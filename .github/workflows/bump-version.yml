name: Bump Version

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    name: Bump & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate new version
        id: calc
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          current=$(grep -o 'VERSION="[^"]*"' srl-sandbox | head -1 | sed 's/VERSION="//;s/"//')
          echo "Current: $current"

          IFS='.' read -r major minor patch <<< "$current"
          case "$BUMP" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac

          new="${major}.${minor}.${patch}"
          echo "New: $new"
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "new=$new" >> "$GITHUB_OUTPUT"

      - name: Update VERSION in script
        env:
          CURRENT: ${{ steps.calc.outputs.current }}
          NEW: ${{ steps.calc.outputs.new }}
        run: sed -i "s/VERSION=\"${CURRENT}\"/VERSION=\"${NEW}\"/" srl-sandbox

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW: ${{ steps.calc.outputs.new }}
          CURRENT: ${{ steps.calc.outputs.current }}
        run: |
          branch="release/v${NEW}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add srl-sandbox
          git commit -m "chore: bump version to ${NEW}"
          git push origin "$branch"

          gh pr create \
            --title "Release v${NEW}" \
            --body "Bumps VERSION from ${CURRENT} to ${NEW}.

Merging this PR will automatically create the \`v${NEW}\` tag, publish the GitHub Release, and update the Homebrew formula." \
            --base main \
            --head "$branch" \
            --label "release"
